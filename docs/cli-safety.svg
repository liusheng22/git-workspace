<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">CLI safety flow</title>
  <desc id="desc">Shows the recommended plan-first workflow for safer pull, switch, and sync commands.</desc>
  <defs><style>.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:SFMono-Regular,Menlo,Consolas,monospace}</style></defs>
  <rect width="1280" height="560" fill="#07111a"/>
  <text x="64" y="66" class="sans" font-size="34" font-weight="800" fill="#e6edf3">Plan before bulk Git changes</text>
  <text x="64" y="98" class="sans" font-size="17" fill="#9fb3c8">TUI ALL is terminal-like. CLI plan / pull / sync adds guardrails for branch and dirty-state workflows.</text>

  <rect x="78" y="150" width="1124" height="78" rx="12" fill="#0e1f2d" stroke="#315a73"/>
  <text x="112" y="199" class="mono" font-size="22" font-weight="800" fill="#7ee787">gws plan daily</text>
  <text x="334" y="199" class="sans" font-size="18" fill="#d7e0ea">shows target branch, dirty state, and planned action for every repo</text>

  <rect x="112" y="286" width="300" height="150" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="144" y="332" class="mono" font-size="20" font-weight="800" fill="#7ee787">gws pull</text>
  <text x="144" y="366" class="sans" font-size="16" fill="#d7e0ea">Pull only repos already on target branch.</text>
  <text x="144" y="400" class="sans" font-size="15" fill="#8b949e">Dirty or wrong-branch repos are skipped.</text>

  <rect x="490" y="286" width="300" height="150" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="522" y="332" class="mono" font-size="20" font-weight="800" fill="#7ee787">gws switch</text>
  <text x="522" y="366" class="sans" font-size="16" fill="#d7e0ea">Checkout profile target branches.</text>
  <text x="522" y="400" class="sans" font-size="15" fill="#8b949e">Dirty worktrees block branch switching.</text>

  <rect x="868" y="286" width="300" height="150" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="900" y="332" class="mono" font-size="20" font-weight="800" fill="#7ee787">gws sync</text>
  <text x="900" y="366" class="sans" font-size="16" fill="#d7e0ea">Switch then pull, using the same safety rules.</text>
  <text x="900" y="400" class="sans" font-size="15" fill="#8b949e">Best for daily workspace alignment.</text>
</svg>
