<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Git Workspace TUI 中文指引</title>
  <desc id="desc">带标注的 TUI 指引图，展示 ALL REPOS、单仓库行、输入框、连续日志和快捷键。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/></filter>
    <style>.mono{font-family:SFMono-Regular,Menlo,Consolas,"PingFang SC",monospace}.sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.callout{fill:#e6edf3;font-size:18px;font-weight:700}.caption{fill:#9fb3c8;font-size:14px}</style>
  </defs>
  <rect width="1280" height="820" fill="#07111a"/>
  <circle cx="1120" cy="100" r="140" fill="#12324a" opacity="0.28"/>
  <circle cx="154" cy="700" r="180" fill="#173f35" opacity="0.2"/>
  <text x="60" y="62" class="sans" font-size="32" font-weight="800" fill="#e6edf3">Git Workspace</text>
  <text x="60" y="92" class="sans" font-size="16" fill="#9fb3c8">一个界面管理多个 Git 仓库</text>
  <g filter="url(#shadow)">
    <rect x="56" y="126" width="1168" height="612" rx="14" fill="#0b1620" stroke="#315a73" stroke-width="2"/>
    <rect x="56" y="126" width="1168" height="44" rx="14" fill="#102638"/>
    <text x="640" y="154" text-anchor="middle" class="mono" font-size="18" font-weight="700" fill="#e6edf3">GitWorkspace</text>
    <text x="1160" y="154" text-anchor="end" class="mono" font-size="14" fill="#8b949e">02:19</text>
    <rect x="82" y="194" width="420" height="464" rx="9" fill="#0e1f2d" stroke="#315a73"/>
    <rect x="82" y="194" width="420" height="42" rx="9" fill="#102638"/>
    <text x="106" y="221" class="mono" font-size="16" font-weight="700" fill="#7ee787">ALL / 仓库</text>
    <text x="354" y="221" class="mono" font-size="12" fill="#8b949e">Tab / Shift+Tab</text>
    <rect x="104" y="254" width="376" height="34" fill="#18364a"/>
    <text x="122" y="276" class="mono" font-size="13" font-weight="700" fill="#9ecbff">repo</text><text x="304" y="276" class="mono" font-size="13" font-weight="700" fill="#9ecbff">branch</text><text x="414" y="276" class="mono" font-size="13" font-weight="700" fill="#9ecbff">state</text>
    <rect x="104" y="302" width="376" height="42" rx="7" fill="#2f6f95"/>
    <text x="122" y="329" class="mono" font-size="16" font-weight="800" fill="#ffffff">ALL REPOS</text><text x="304" y="329" class="mono" font-size="15" font-weight="700" fill="#ffffff">-</text><text x="414" y="329" class="mono" font-size="15" font-weight="800" fill="#ffffff">ALL</text>
    <g class="mono" font-size="15" fill="#d7e0ea"><text x="122" y="384">api</text><text x="304" y="384" fill="#7ee787">main</text><text x="414" y="384" fill="#7ee787">clean</text><text x="122" y="426">web</text><text x="304" y="426" fill="#ffa657">dev</text><text x="414" y="426" fill="#ff7b72">dirty:1</text><text x="122" y="468">auth</text><text x="304" y="468" fill="#7ee787">main</text><text x="414" y="468" fill="#7ee787">clean</text><text x="122" y="510">gateway</text><text x="304" y="510" fill="#ffa657">dev</text><text x="414" y="510" fill="#7ee787">clean</text></g>
    <rect x="532" y="194" width="666" height="464" rx="9" fill="#07111a" stroke="#315a73"/>
    <rect x="532" y="194" width="666" height="42" rx="9" fill="#102638"/>
    <text x="556" y="221" class="mono" font-size="16" font-weight="800" fill="#7ee787">ALL</text><text x="602" y="221" class="mono" font-size="16" font-weight="700" fill="#d7e0ea">5 repos</text><text x="1108" y="221" class="mono" font-size="13" fill="#8b949e">连续日志</text>
    <g class="mono" font-size="15"><text x="556" y="276" fill="#7ee787">scope: ALL (5 repos)</text><text x="556" y="312" fill="#9ecbff">api</text><text x="596" y="312" fill="#8b949e">@</text><text x="616" y="312" fill="#7ee787">main</text><text x="556" y="344" fill="#7ee787">shell &gt;</text><text x="636" y="344" fill="#ffffff">git status -sb</text><text x="556" y="376" fill="#d7e0ea">## main...origin/main</text><text x="556" y="408" fill="#7ee787">completed (0.2s)</text><text x="556" y="460" fill="#9ecbff">web</text><text x="596" y="460" fill="#8b949e">@</text><text x="616" y="460" fill="#ffa657">dev</text><text x="556" y="492" fill="#7ee787">shell &gt;</text><text x="636" y="492" fill="#ffffff">git status -sb</text><text x="556" y="524" fill="#d7e0ea">## dev...origin/dev</text><text x="556" y="556" fill="#ff7b72"> M src/App.tsx</text><text x="556" y="588" fill="#7ee787">completed (0.2s)</text></g>
    <rect x="556" y="604" width="618" height="44" rx="8" fill="#0e1f2d" stroke="#7ee787" stroke-width="2"/>
    <text x="576" y="632" class="mono" font-size="16" font-weight="800" fill="#7ee787">ALL</text><text x="626" y="632" class="mono" font-size="16" font-weight="800" fill="#7ee787">shell &gt;</text><text x="722" y="632" class="mono" font-size="16" fill="#e6edf3">git status -sb</text>
  </g>
  <circle cx="102" cy="302" r="18" fill="#7ee787"/><text x="102" y="308" text-anchor="middle" class="sans" font-size="16" font-weight="800" fill="#07111a">1</text><text x="58" y="774" class="callout sans">1. 选 ALL REPOS 执行批量命令</text><text x="58" y="798" class="caption sans">第一行是默认目标，会在每个仓库里依次执行。</text>
  <circle cx="122" cy="372" r="18" fill="#9ecbff"/><text x="122" y="378" text-anchor="middle" class="sans" font-size="16" font-weight="800" fill="#07111a">2</text><text x="374" y="774" class="callout sans">2. 按 Tab 进入单仓库</text><text x="374" y="798" class="caption sans">测试、构建、切分支、pull 都可以只作用于当前仓库。</text>
  <circle cx="558" cy="604" r="18" fill="#ffa657"/><text x="558" y="610" text-anchor="middle" class="sans" font-size="16" font-weight="800" fill="#07111a">3</text><text x="700" y="774" class="callout sans">3. 输入一次，日志连续显示</text><text x="700" y="798" class="caption sans">结果留在右侧日志区，不会跳转到新页面。</text>
  <rect x="882" y="46" width="342" height="104" rx="10" fill="#0e1f2d" stroke="#315a73"/><text x="904" y="76" class="mono" font-size="14" font-weight="800" fill="#7ee787">快捷键</text><text x="904" y="102" class="mono" font-size="13" fill="#d7e0ea">Tab / Shift+Tab  移动目标</text><text x="904" y="124" class="mono" font-size="13" fill="#d7e0ea">Ctrl+C 取消或退出  ·  :git / :shell</text>
</svg>
