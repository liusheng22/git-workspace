<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Workspace configuration model</title>
  <desc id="desc">Shows how workspace.yml defines repositories, profiles, aliases, and execution mode.</desc>
  <defs><style>.sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:SFMono-Regular,Menlo,Consolas,monospace}</style></defs>
  <rect width="1280" height="560" fill="#07111a"/>
  <text x="64" y="66" class="sans" font-size="34" font-weight="800" fill="#e6edf3">workspace.yml describes the workspace</text>
  <text x="64" y="98" class="sans" font-size="17" fill="#9fb3c8">Use config when you want shared repo paths, target branches, profiles, and portable shortcuts.</text>

  <rect x="74" y="144" width="430" height="330" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="104" y="184" class="mono" font-size="18" font-weight="800" fill="#7ee787">workspace.yml</text>
  <text x="104" y="226" class="mono" font-size="15" fill="#d7e0ea">repos:</text>
  <text x="128" y="256" class="mono" font-size="15" fill="#9ecbff">api: default main</text>
  <text x="128" y="286" class="mono" font-size="15" fill="#9ecbff">web: default dev</text>
  <text x="104" y="332" class="mono" font-size="15" fill="#d7e0ea">profiles:</text>
  <text x="128" y="362" class="mono" font-size="15" fill="#ffa657">daily: api main, web dev</text>
  <text x="104" y="408" class="mono" font-size="15" fill="#d7e0ea">aliases:</text>
  <text x="128" y="438" class="mono" font-size="15" fill="#7ee787">gco: checkout</text>

  <g stroke="#7ee787" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M530 300 H610"/><path d="M594 284 L614 300 L594 316"/>
  </g>

  <rect x="646" y="144" width="250" height="140" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="674" y="190" class="sans" font-size="21" font-weight="800" fill="#9ecbff">Status / Plan</text>
  <text x="674" y="226" class="sans" font-size="16" fill="#d7e0ea">Target branches and safe actions</text>

  <rect x="936" y="144" width="250" height="140" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="964" y="190" class="sans" font-size="21" font-weight="800" fill="#9ecbff">TUI Prompt</text>
  <text x="964" y="226" class="mono" font-size="16" fill="#7ee787">api@main shell &gt;</text>

  <rect x="646" y="334" width="250" height="140" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="674" y="380" class="sans" font-size="21" font-weight="800" fill="#9ecbff">Git aliases</text>
  <text x="674" y="416" class="mono" font-size="16" fill="#7ee787">gco dev</text>

  <rect x="936" y="334" width="250" height="140" rx="14" fill="#0e1f2d" stroke="#315a73"/>
  <text x="964" y="380" class="sans" font-size="21" font-weight="800" fill="#9ecbff">Profiles</text>
  <text x="964" y="416" class="mono" font-size="16" fill="#7ee787">gws sync daily</text>
</svg>
